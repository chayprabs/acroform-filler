name: Release

on:
  workflow_dispatch:
    inputs:
      web_url:
        description: "Hosted web URL for post-deploy verification"
        required: false
        type: string
      api_url:
        description: "Hosted API health URL for post-deploy verification"
        required: false
        type: string
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @pdf-forms/web build
      - run: python -m pip install -e ./apps/worker

  publish-images:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: worker_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/acroform-filler-worker
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha
      - id: web_meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/acroform-filler-web
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/worker/Dockerfile
          push: true
          tags: ${{ steps.worker_meta.outputs.tags }}
          labels: ${{ steps.worker_meta.outputs.labels }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.web_meta.outputs.tags }}
          labels: ${{ steps.web_meta.outputs.labels }}

  verify-hosted:
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    env:
      PDF_FORMS_WEB_URL: ${{ github.event.inputs.web_url || vars.PDF_FORMS_WEB_URL }}
      PDF_FORMS_API_URL: ${{ github.event.inputs.api_url || vars.PDF_FORMS_API_URL }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: python apps/worker/scripts/verify_hosted.py --allow-missing --derive-api-from-web --output apps/worker/artifacts/hosted/verify-hosted.json
      - uses: actions/upload-artifact@v5
        with:
          name: hosted-verification
          path: apps/worker/artifacts/hosted/verify-hosted.json
